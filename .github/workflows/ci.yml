name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run native:verify:offline
        env:
          VITALS_SINGLE_COMPILER_RPC_MAINNET_ACK: "I ACCEPT SINGLE AML COMPILER RPC FOR MAINNET"
